apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: cilium-system
spec:
  releaseName: ingress-nginx
  interval: 5m
  chart:
    spec:
      chart: cilium
      version: 1.16.3
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: cilium-system
      interval: 5m
  values:
    tunnel: "vxlan"
    ipv4:
      enabled: true
    kubeProxyReplacement: "strict"
    k8sServiceHost: "130.61.237.219"
    k8sServicePort: 6443
    healthChecking: true
    autoDirectNodeRoutes: true
    clustermesh:
      useAPIServer: true
      apiserver:
        enabled: true
        service:
          type: LoadBalancer
