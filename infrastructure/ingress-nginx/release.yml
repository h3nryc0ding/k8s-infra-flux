apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-ingress
  namespace: ingress-system
spec:
  releaseName: ingress-nginx
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      version: 1.11.3
      sourceRef:
        kind: HelmRepository
        name: nginx-ingress-charts
        namespace: ingress-system
      interval: 5m
